version: 2

models:
  - name: dim_parking_facility
    description: "One row per off-street parking facility with its latest attributes."
    columns:
      - name: garage_id
        description: "Stable facility identifier."
        tests: [not_null, unique]
      - name: capacity
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true

  - name: fct_traffic_intensity
    description: "5-minute traffic intensity & speed per NDW measurement site."
    columns:
      - name: congestion_level
        tests:
          - accepted_values:
              arguments:
                values: ["free", "moderate", "heavy", "unknown"]
      - name: n_obs
        tests: [not_null]

  - name: fct_city_traffic
    description: "Latest TomTom city-road congestion per sampled point."
    columns:
      - name: point_id
        tests: [not_null]
      - name: congestion_ratio
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1
                inclusive: true
      - name: congestion_level
        tests:
          - accepted_values:
              arguments:
                values: ["free", "moderate", "heavy", "unknown"]
