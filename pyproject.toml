[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
# Pyflakes (F), pycodestyle errors (E), bugbear (B). Pyupgrade (UP) is omitted on
# purpose: one of its fixes rewrites timezone.utc -> datetime.UTC, which would
# break the Python 3.11 Azure Functions runtime.
select = ["E", "F", "B"]
ignore = ["E501"]  # long SQL / tooltip strings are fine
