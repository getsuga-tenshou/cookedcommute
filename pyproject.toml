[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
# Pyflakes (F), pycodestyle errors (E), bugbear (B). Pyupgrade (UP) is omitted on
# purpose: one of its fixes rewrites timezone.utc -> datetime.UTC, which is 3.11+
# only and would break the 3.10-compatible runtime. isort (I) is omitted because
# the dashboard entrypoint deliberately interleaves a sys.path shim with imports.
select = ["E", "F", "B"]
ignore = ["E501"]  # long SQL / tooltip strings are fine
